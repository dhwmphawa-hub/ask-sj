<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For SJ ✨</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; transition: background 0.5s ease; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); max-width: 400px; width: 100%; }
        /* The final reveal image hidden by default */
        #revealImg { width: 100%; border-radius: 20px; margin-bottom: 20px; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .greeting { font-size: 2rem; color: #d63384; font-weight: 800; margin-bottom: 10px; }
        h1 { color: #555; font-size: 1.3rem; margin-bottom: 30px; line-height: 1.4; }
        .buttons { display: flex; justify-content: center; gap: 15px; height: 70px; margin-top: 20px; position: relative; }
        button { padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #yesBtn { background-color: #4caf50; color: white; z-index: 10; }
        #noBtn { background-color: #ff4757; color: white; position: absolute; z-index: 10; }
    </style>
</head>
<body>

    <div class="container" id="card">
        <img id="revealImg" src="sj-phone.jpg" alt="SJ saying yes">
        
        <div class="greeting" id="greetingText">Hey SJ</div>
        <h1 id="heading">Will you make me the luckiest guy and be my girlfriend? 💖</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const heading = document.getElementById('heading');
        const greetingText = document.getElementById('greetingText');
        const revealImg = document.getElementById('revealImg');
        const body = document.body;

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 120);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            body.style.background = `linear-gradient(135deg, #${Math.floor(Math.random()*16777215).toString(16)} 0%, #ff758c 100%)`;
            const currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '').replace(')', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.15})`;
        }

        function celebrate() {
            body.style.background = "#ff758c";
            greetingText.innerHTML = "You're mine now! 😉";
            heading.innerHTML = "I knew you always had a secret crush on me!";
            revealImg.style.display = 'block'; // Shows the image
            document.querySelector('.buttons').style.display = 'none';
            confetti({ particleCount: 500, spread: 200, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
